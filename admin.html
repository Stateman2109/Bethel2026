<!doctype html>
<html lang="en">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

    <script>
      (function () {
        emailjs.init("N6SGbYn2hX1_-04tu");
      })();
    </script>
    <meta charset="UTF-8" />
    <title>Wedding Admin Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/admin.js?v=nigerian_fix_ultimate" defer></script>

    <style>
      body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        background: #0f0f0f;
        color: white;
      }

      .header {
        background: linear-gradient(90deg, #b76e79, #d4af37);
        padding: 20px;
        text-align: center;
      }

      .header h1 {
        margin: 0;
        font-size: 28px;
      }

      .container {
        padding: 30px;
      }

      .stats {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
      }

      .card {
        flex: 1;
        background: #1a1a1a;
        padding: 20px;
        border-radius: 15px;
        text-align: center;
        border: 1px solid #333;
      }

      .card h2 {
        color: gold;
        margin: 0;
      }

      select,
      textarea {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border-radius: 10px;
        border: none;
        outline: none;
      }

      button {
        margin-top: 10px;
        padding: 12px;
        background: gold;
        border: none;
        border-radius: 10px;
        font-weight: bold;
        cursor: pointer;
      }

      table {
        width: 100%;
        margin-top: 30px;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 12px;
        border-bottom: 1px solid #333;
        text-align: left;
      }

      th {
        color: gold;
      }

      .badge {
        padding: 5px 10px;
        border-radius: 20px;
        font-size: 12px;
      }

      .yes {
        background: green;
      }
      .no {
        background: red;
      }

      .actions button {
        margin-right: 5px;
        padding: 6px 10px;
        font-size: 12px;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <h1>💍 Wedding Admin Dashboard</h1>
    </div>

    <div class="container">
      <!-- STATS -->
      <div class="stats">
        <div class="card">
          <h2 id="total">0</h2>
          <p>Total RSVP</p>
        </div>

        <div class="card">
          <h2 id="yesCount">0</h2>
          <p>Attending</p>
        </div>

        <div class="card">
          <h2 id="noCount">0</h2>
          <p>Not Attending</p>
        </div>
      </div>

      <!-- CONTROLS -->
      <select id="filter" onchange="loadData()">
        <option value="all">All Guests</option>
        <option value="yes">Attending</option>
        <option value="no">Not Attending</option>
      </select>

      <textarea id="message" placeholder="Write reminder message..."></textarea>

      <button onclick="sendWhatsAppAll()">Send WhatsApp Bulk</button>
      <button onclick="exportCSV()">Export CSV</button>
      <button onclick="sendEmailAll()">Send Email Bulk</button>

      <!-- TABLE -->
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Attendance</th>
            <th>Receiver</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <script>
      // 🛠️ Fully verified WhatsApp link layout
      function sendOne(phone) {
        if (!phone || phone === "undefined" || phone.trim() === "") {
          alert(
            "❌ Error: This guest does not have a phone number in the database!",
          );
          return;
        }

        const msg = document.getElementById("message").value;
        let cleanPhone = phone.trim();

        if (cleanPhone.startsWith("0")) {
          cleanPhone = "234" + cleanPhone.substring(1);
        }

        // ✅ Fixed Link: Notice the exact placement of the question mark, phone, and equals sign
        // normalize phone, remove spaces and leading +
        cleanPhone = cleanPhone.replace(/\s+/g, "");
        if (cleanPhone.startsWith("+")) cleanPhone = cleanPhone.slice(1);

        var finalUrl = `https://wa.me/${cleanPhone}?text=${encodeURIComponent(
          msg,
        )}`;
        window.open(finalUrl, "_blank");
      }

      function sendWhatsAppAll() {
        const msg = document.getElementById("message").value;
        let sentCount = 0;

        allData.forEach((user) => {
          if (
            user.phone &&
            user.phone !== "undefined" &&
            user.phone.trim() !== ""
          ) {
            let cleanPhone = user.phone.trim();

            if (cleanPhone.startsWith("0")) {
              cleanPhone = "234" + cleanPhone.substring(1);
            }

            // normalize phone, remove spaces and leading +
            cleanPhone = cleanPhone.replace(/\s+/g, "");
            if (cleanPhone.startsWith("+")) cleanPhone = cleanPhone.slice(1);

            var finalUrl = `https://wa.me/${cleanPhone}?text=${encodeURIComponent(
              msg,
            )}`;
            window.open(finalUrl, "_blank");
            sentCount++;
          }
        });

        if (sentCount === 0) {
          alert("❌ No guests found with valid phone numbers to text.");
        } else {
          alert("Opening WhatsApp chats for " + sentCount + " guests... 💬");
        }
      }
    </script>
  </body>
</html>
