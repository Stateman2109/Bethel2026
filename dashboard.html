<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding RSVP Admin Dashboard</title>
    <!-- Include Supabase CDN -->
    <!-- Replace jsdelivr with this unpkg link -->
<!-- Replace the old unpkg line with this cdnjs link -->
<script src="https://cloudflare.com"></script>
<script src="js/admin-dashboard.js"></script>

    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        h2 { color: #333; margin: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; color: #555; font-weight: bold; }
        tr:hover { background-color: #fdfdfd; }
        .badge { padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .badge-yes { background-color: #d4edda; color: #155724; }
        .badge-no { background-color: #f8d7da; color: #721c24; }
        .login-box { text-align: center; padding: 50px 20px; }
        input[type="password"] { padding: 10px; width: 250px; border: 1px solid #ccc; border-radius: 4px; margin-right: 10px; }
        button { padding: 10px 20px; background-color: #333; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #555; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <!-- 🔒 STEP 1: PASSWORD ACCESS AREA -->
        <div id="authArea" class="login-box">
            <h2>Enter Admin Password</h2>
            <p>Please enter your secret password to view the RSVP list.</p>
            <input type="password" id="adminPassword" placeholder="Enter Password">
            <button id="loginBtn">Access Dashboard</button>
        </div>

        <!-- 📊 STEP 2: THE ACTUAL DASHBOARD (Hidden until password is correct) -->
        <div id="dashboardArea" class="hidden">
            <div class="header">
                <h2>Wedding RSVP Responses 🤵👰</h2>
                <button id="logoutBtn">Lock Dashboard</button>
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Attendance</th>
                        <th>Notified</th>
                        <th>Message</th>
                    </tr>
                </thead>
                <tbody id="rsvpRows">
                    <!-- External script will insert rows here -->
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
